version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8000"
    depends_on:
      - redis
    volumes:
      - ./models:/app/models
      - ./data:/data           # SQLite DB will be stored here
    environment:
      - REDIS_URL=redis://redis:6379

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus