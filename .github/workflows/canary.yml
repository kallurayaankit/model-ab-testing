name: Canary Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: aiankit/ab-testing-api:latest

  # Simulated canary (just prints what would happen; in production you'd SSH)
  canary:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Simulate canary deployment
        run: |
          echo "1. Set CHAMPION_WEIGHT=0.5 (50% traffic to champion, 50% to challenger)"
          echo "2. Wait 5 minutes, check error rate..."
          echo "3. If error rate < 1%, set CHAMPION_WEIGHT=0.0 (all traffic to challenger)"
          echo "4. If error rate > threshold, rollback: set CHAMPION_WEIGHT=1.0 (all traffic back to champion)"
          echo "This simulation can be replaced with real kubectl/helm commands for Kubernetes."